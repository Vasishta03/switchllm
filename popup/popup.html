<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
  <title>SwitchLLM</title>
</head>
<body>
  <!-- Firefox popup requires explicit content dimensions -->
  <div class="container">
    <header>
      <h1>SwitchLLM</h1>
      <p class="subtitle">Transfer AI conversations instantly</p>
    </header>

    <section class="status" id="status-section">
      <div class="status-indicator" id="status-indicator">
        <span class="dot" id="status-dot"></span>
        <span id="status-text">No conversation captured</span>
      </div>
    </section>

    <section class="actions">
      <button id="btn-grab" class="btn btn-grab">
        <span class="btn-icon">&#8595;</span>
        Grab from Claude
      </button>

      <div class="divider">
        <span>then send to</span>
      </div>

      <button id="btn-chatgpt" class="btn btn-send" disabled>
        <span class="btn-icon">&#8599;</span>
        Send to ChatGPT
      </button>

      <button id="btn-gemini" class="btn btn-send" disabled>
        <span class="btn-icon">&#8599;</span>
        Send to Gemini
      </button>
    </section>

    <section class="info" id="info-section" style="display:none;">
      <p id="info-text"></p>
    </section>

    <section class="stats-panel" id="stats-panel" style="display:none;">
      <div class="stats-header">Token Estimate</div>
      <div class="stats-row">
        <span class="stats-label">Tokens</span>
        <span class="stats-value" id="token-count">-</span>
      </div>
      <div class="stats-row">
        <span class="stats-label">Characters</span>
        <span class="stats-value" id="char-count">-</span>
      </div>
      <div class="stats-divider"></div>
      <div class="stats-header">Usage Tracker</div>
      <div class="stats-row">
        <span class="stats-label">Handoffs today</span>
        <span class="stats-value" id="handoffs-today">0</span>
      </div>
      <div class="stats-row">
        <span class="stats-label">Total handoffs</span>
        <span class="stats-value" id="handoffs-total">0</span>
      </div>
    </section>

    <footer>
      <button id="btn-clear" class="btn-link">Clear captured context</button>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
